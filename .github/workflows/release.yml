name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 11.7.0
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build renderer
        run: pnpm build

      - name: Package macOS app
        run: pnpm exec electron-builder --mac --publish never

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: oolong ${{ github.ref_name }}
          body: |
            ## Downloads

            Download the macOS DMG or ZIP from the assets below.

            ## Notes

            This is an unsigned macOS build. macOS may require allowing the app manually from System Settings when opening it for the first time.
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
